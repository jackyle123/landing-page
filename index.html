<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Offer</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
    text-align: center;
}
.container { padding: 40px 15px; }
.card {
    max-width: 420px;
    margin: auto;
    background: #1f2937;
    padding: 25px;
    border-radius: 16px;
}
h1 { font-size: 26px; }
.sub { font-size: 14px; opacity: 0.8; }
.value { margin: 20px 0; font-size: 18px; line-height: 1.8; }
.highlight { color: #22c55e; font-size: 22px; font-weight: bold; }
.btn {
    display: inline-block;
    width: 85%;
    padding: 15px;
    margin-top: 20px;
    background: #22c55e;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    text-decoration: none;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Welcome Offer</h1>
    <div class="sub">Limited time promotion</div>
    <div class="value">
      Start Value: <span class="highlight">300</span><br>
      Bonus Value: <span class="highlight">500</span><br>
      Total Value: <span class="highlight">800</span>
    </div>
    <a class="btn" href="https://YOUR-LINK-HERE.com">Get Started</a>
  </div>
</div>
</body>
</html>
